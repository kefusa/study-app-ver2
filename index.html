<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker App</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#0f1115;
  color:#fff;
}

/* ヘッダー */
.header{
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

/* カード */
.card{
  background:#1b1f2a;
  margin:12px;
  padding:14px;
  border-radius:14px;
}

/* 入力 */
input,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-size:14px;
}

input{
  background:#2a2f3d;
  color:white;
}

button{
  background:#4c7dff;
  color:white;
  font-weight:bold;
}

/* カレンダー */
.calendar{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:12px;
}

/* 日カード */
.day{
  background:#1b1f2a;
  border-radius:14px;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.date{
  font-size:14px;
  opacity:0.7;
}

.today{
  border:2px solid #4c7dff;
}

.title{
  font-size:15px;
  font-weight:bold;
}

.sub{
  font-size:13px;
  opacity:0.8;
}

/* 色分け */
.test{color:#ff4d4d}
.focus{color:#ffd24d}
.due{color:#ff9f43}

/* ストリーク */
.streak{
  font-size:22px;
  font-weight:bold;
  color:#4c7dff;
}
</style>
</head>

<body>

<div class="header">📚 Study Tracker</div>

<div class="card">
<div>🔥 ストリーク</div>
<div class="streak" id="streak">0日</div>
</div>

<div class="card">
<div>📅 テスト日</div>
<input id="testDate" placeholder="YYYY-MM-DD">
<button onclick="setTest()">設定</button>
</div>

<div class="card">
<div>📌 予定追加</div>

<input id="eventDate" placeholder="YYYY-MM-DD">
<input id="eventText" placeholder="内容">
<button onclick="addEvent()">追加</button>
</div>

<div class="calendar" id="calendar"></div>

<script>

let testDate=null;
let events={};

/* 保存 */
function save(){
  localStorage.setItem("testDate",document.getElementById("testDate").value||"");
  localStorage.setItem("events",JSON.stringify(events));
}

/* 読み込み */
function load(){
  const t=localStorage.getItem("testDate");
  if(t){
    document.getElementById("testDate").value=t;
    testDate=new Date(t.replace(/-/g,"/"));
  }

  const e=localStorage.getItem("events");
  if(e) events=JSON.parse(e);

  render();
}

/* テスト日 */
function setTest(){
  const v=document.getElementById("testDate").value;
  if(!v) return;

  testDate=new Date(v.replace(/-/g,"/"));
  save();
  render();
}

/* 予定 */
function addEvent(){
  const d=document.getElementById("eventDate").value;
  const t=document.getElementById("eventText").value;
  if(!d||!t) return;

  if(!events[d]) events[d]=[];
  events[d].push({text:t});

  save();
  render();
}

/* 日付キー */
function key(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/* ストリーク（簡易） */
function updateStreak(){
  document.getElementById("streak").innerText = Object.keys(events).length + "日";
}

/* カレンダー */
function render(){

  const c=document.getElementById("calendar");
  c.innerHTML="";

  if(!testDate){
    c.innerHTML="<div class='card'>テスト日を設定してください</div>";
    return;
  }

  for(let i=0;i<=30;i++){

    let d=new Date(testDate);
    d.setDate(d.getDate()-i);

    let k=key(d);
    let label=`${d.getMonth()+1}/${d.getDate()}`;

    let div=document.createElement("div");
    div.className="day"+(i===0?" today":"");

    let ev="";

    if(events[k]){
      ev=events[k].map(e=>"・"+e.text).join("<br>");
    }

    let tag="";
    if(i===0) tag="📌 テスト日";
    else if(i===14) tag="⚠ 締切";
    else if(i<14) tag="📚 集中期間";

    div.innerHTML=`
      <div class="date">${label}</div>
      <div class="title ${i===0?'test':i===14?'due':i<14?'focus':''}">${tag}</div>
      <div class="sub">${ev}</div>
    `;

    c.appendChild(div);
  }

  updateStreak();
}

/* 起動 */
load();

</script>

</body>
</html>

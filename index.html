<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 15px;
  background: #f5f5f5;
  max-width: 500px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select, button {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
  font-size: 16px;
}

button {
  cursor: pointer;
}

.task {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

.done {
  text-decoration: line-through;
  color: gray;
}

.calendar-day {
  padding: 5px;
  border-bottom: 1px solid #ddd;
  font-size: 14px;
}

.test { color: red; font-weight: bold; }
.focus { color: #333; }
.due { color: orange; font-weight: bold; }

.small {
  font-size: 13px;
  color: #666;
}
</style>
</head>

<body>

<h1>📚 Study Tracker</h1>

<!-- テスト -->
<div class="card">
<h2>📅 テスト日</h2>
<input type="date" id="testDate">
<button onclick="setTest()">設定</button>
<p id="countdown"></p>
</div>

<!-- 勉強 -->
<div class="card">
<h2>📖 勉強時間</h2>

<select id="subject">
  <option>国語</option>
  <option>数学</option>
  <option>英語</option>
  <option>理科</option>
  <option>社会</option>
</select>

<input type="number" id="time" placeholder="分">
<button onclick="addStudy()">追加</button>

<div id="studyResult"></div>
<p id="total">合計：0分</p>
</div>

<!-- 課題 -->
<div class="card">
<h2>📝 課題</h2>

<input type="text" id="taskInput" placeholder="例：英語 P10〜P15">
<input type="date" id="borderDate">
<button onclick="addTask()">追加</button>

<div id="tasks"></div>
</div>

<!-- タイマー -->
<div class="card">
<h2>⏱ ポモドーロ</h2>
<p id="timer">25:00</p>

<button onclick="startTimer()">▶</button>
<button onclick="pauseTimer()">⏸</button>
<button onclick="resetTimer()">🔁</button>

<p class="small" id="cycle">セット：0 / 4</p>
</div>

<!-- カレンダー -->
<div class="card">
<h2>📅 30日カレンダー</h2>
<div id="calendar"></div>
</div>

<!-- アドバイス -->
<div class="card">
<h2>📘 アドバイス</h2>
<div id="advice"></div>
</div>

<script>

let studyData = {
  国語:0, 数学:0, 英語:0, 理科:0, 社会:0
};

let total = 0;
let testDate = null;

/* ================= 保存 ================= */

function saveData(){
  localStorage.setItem("studyData", JSON.stringify(studyData));
  localStorage.setItem("total", total);
  localStorage.setItem("tasks", document.getElementById("tasks").innerHTML);
  localStorage.setItem("testDate", document.getElementById("testDate").value);
}

function loadData(){
  const s = JSON.parse(localStorage.getItem("studyData"));
  if(s) studyData = s;

  const t = localStorage.getItem("total");
  if(t) total = Number(t);

  const tasks = localStorage.getItem("tasks");
  if(tasks) document.getElementById("tasks").innerHTML = tasks;

  const d = localStorage.getItem("testDate");
  if(d){
    document.getElementById("testDate").value = d;
    testDate = new Date(d);
    generateCalendar();
    showAdvice();
  }

  updateStudy();
}

/* ================= 勉強 ================= */

function addStudy(){
  const s = document.getElementById("subject").value;
  const t = Number(document.getElementById("time").value);

  if(!t) return;

  studyData[s] += t;
  total += t;

  updateStudy();
  saveData();
}

function updateStudy(){
  let html = "";
  for(let s in studyData){
    html += `${s}：${studyData[s]}分<br>`;
  }

  document.getElementById("studyResult").innerHTML = html;
  document.getElementById("total").innerText = "合計：" + total + "分";
}

/* ================= 課題 ================= */

function addTask(){
  const input = document.getElementById("taskInput");
  const date = document.getElementById("borderDate").value;

  if(!input.value) return;

  const div = document.createElement("div");
  div.className = "task";

  div.innerHTML = `
    <span onclick="toggle(this)">
      ☐ ${input.value}（${date}）
    </span>
    <button onclick="this.parentElement.remove(); saveData();">削除</button>
  `;

  document.getElementById("tasks").appendChild(div);
  input.value = "";
  saveData();
}

function toggle(el){
  el.classList.toggle("done");
  saveData();
}

/* ================= テスト ================= */

function setTest(){
  testDate = new Date(document.getElementById("testDate").value);
  saveData();
  generateCalendar();
  showAdvice();
}

function updateCountdown(){
  if(!testDate) return;

  const now = new Date();
  const diff = Math.ceil((testDate - now)/(1000*60*60*24));

  document.getElementById("countdown").innerText =
    "あと " + diff + "日";
}

setInterval(updateCountdown,1000);

/* ================= カレンダー ================= */

function generateCalendar(){
  if(!testDate) return;

  const c = document.getElementById("calendar");
  c.innerHTML = "";

  for(let i = 30; i >= 0; i--){
    let d = new Date(testDate);
    d.setDate(d.getDate() - i);

    let div = document.createElement("div");
    div.className = "calendar-day";

    let text = `${d.getMonth()+1}/${d.getDate()}`;

    if(i === 0){
      div.innerHTML = `<span class="test">${text} テスト</span>`;
    }
    else if(i === 14){
      div.innerHTML = `<span class="due">${text} ⚠ 課題締切</span>`;
    }
    else if(i < 14){
      div.innerHTML = `<span class="focus">${text} 📚 集中期間</span>`;
    }
    else {
      div.innerHTML = `<span>${text}</span>`;
    }

    c.appendChild(div);
  }
}

/* ================= アドバイス ================= */

function showAdvice(){
  document.getElementById("advice").innerHTML = `
  <p>🇬🇧 英語：音読＋文法＋熟語</p>
  <p>🧪 理科：暗記＋筆記</p>
  <p>🌍 社会：暗記</p>
  <p>🔢 数学：見直し</p>
  <p>📘 国語：漢字</p>
  `;
}

/* ================= タイマー ================= */

let time = 1500;
let timer = null;
let cycle = 0;

function updateTimer(){
  let m = Math.floor(time/60);
  let s = time%60;

  document.getElementById("timer").innerText =
    `${m}:${s.toString().padStart(2,"0")}`;
}

function startTimer(){
  if(timer) return;

  timer = setInterval(()=>{
    time--;
    updateTimer();

    if(time <= 0){
      clearInterval(timer);
      timer = null;

      cycle++;
      document.getElementById("cycle").innerText =
        "セット：" + cycle + " / 4";

      time = (cycle % 2 === 1) ? 300 : 1500;

      updateTimer();
      saveData();
    }
  },1000);
}

function pauseTimer(){
  clearInterval(timer);
  timer = null;
}

function resetTimer(){
  clearInterval(timer);
  timer = null;
  time = 1500;
  cycle = 0;
  document.getElementById("cycle").innerText = "セット：0 / 4";
  updateTimer();
}

/* ================= 起動 ================= */

updateTimer();
loadData();

</script>

</body>
</html>

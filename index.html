<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 15px;
  max-width: 500px;
  margin: auto;
  background: #f5f5f5;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  font-size: 16px;
}

button { cursor: pointer; }

.calendar-day {
  padding: 6px;
  border-bottom: 1px solid #ddd;
  font-size: 14px;
}

.test { color: red; font-weight: bold; }
.focus { color: #333; }
.due { color: orange; font-weight: bold; }
</style>
</head>

<body>

<h1>📚 Study Tracker</h1>

<!-- テスト日 -->
<div class="card">
<h2>📅 テスト日</h2>
<input type="date" id="testDate">
<button onclick="setTest()">設定</button>
<p id="countdown"></p>
</div>

<!-- 予定追加 -->
<div class="card">
<h2>📅 予定追加</h2>

<input type="date" id="eventDate">

<select id="eventType">
  <option value="study">勉強</option>
  <option value="club">部活</option>
  <option value="cram">塾</option>
  <option value="task">課題</option>
</select>

<input type="text" id="eventText" placeholder="内容">

<button onclick="addEvent()">追加</button>
</div>

<!-- カレンダー -->
<div class="card">
<h2>📅 カレンダー</h2>
<div id="calendar"></div>
</div>

<script>

let testDate = null;
let events = {};

/* ================= 保存 ================= */

function saveData(){
  localStorage.setItem("testDate", document.getElementById("testDate").value);
  localStorage.setItem("events", JSON.stringify(events));
}

/* ================= 読み込み ================= */

function loadData(){

  const t = localStorage.getItem("testDate");
  if(t){
    document.getElementById("testDate").value = t;
    testDate = new Date(t + "T00:00:00"); // ←ズレ防止
  }

  const e = localStorage.getItem("events");
  if(e) events = JSON.parse(e);

  generateCalendar();
}

/* ================= テスト日設定 ================= */

function setTest(){
  const v = document.getElementById("testDate").value;
  if(!v) return;

  testDate = new Date(v + "T00:00:00"); // ←ズレ防止
  saveData();
  generateCalendar();
}

/* ================= 予定追加 ================= */

function addEvent(){

  const date = document.getElementById("eventDate").value;
  const text = document.getElementById("eventText").value;

  if(!date || !text){
    alert("日付と内容を入力してね");
    return;
  }

  if(!events[date]){
    events[date] = [];
  }

  events[date].push({ text });

  document.getElementById("eventText").value = "";

  saveData();
  generateCalendar();
}

/* ================= 安定日付キー ================= */

function formatDate(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/* ================= カレンダー ================= */

function generateCalendar(){

  const c = document.getElementById("calendar");
  c.innerHTML = "";

  // テスト未設定でも表示
  if(!testDate){
    c.innerHTML = "📅 テスト日を設定してください";
    return;
  }

  for(let i = 30; i >= 0; i--){

    let d = new Date(testDate);
    d.setDate(d.getDate() - i);

    const key = formatDate(d);
    const label = `${d.getMonth()+1}/${d.getDate()}`;

    let div = document.createElement("div");
    div.className = "calendar-day";

    let eventText = "";

    if(events[key]){
      eventText = "<br>" + events[key]
        .map(e => "・" + e.text)
        .join("<br>");
    }

    if(i === 0){
      div.innerHTML = `<span class="test">${label} テスト</span>${eventText}`;
    }
    else if(i === 14){
      div.innerHTML = `<span class="due">${label} ⚠ 課題締切</span>${eventText}`;
    }
    else if(i < 14){
      div.innerHTML = `<span class="focus">${label} 📚 集中期間</span>${eventText}`;
    }
    else {
      div.innerHTML = `${label}${eventText}`;
    }

    c.appendChild(div);
  }
}

/* ================= 起動 ================= */

loadData();

</script>

</body>
</html>

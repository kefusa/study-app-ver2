
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker Pro+</title>

<style>
body{
  font-family:sans-serif;
  margin:0;
  padding:15px;
  max-width:500px;
  margin:auto;
  background:#f5f5f5;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  font-size:16px;
}

button{cursor:pointer}

.calendar-day{
  padding:6px;
  border-bottom:1px solid #ddd;
  font-size:14px;
}

.test{color:red;font-weight:bold}
.focus{color:#333}
.due{color:orange;font-weight:bold}

.small{
  font-size:14px;
  color:#666;
}
</style>
</head>

<body>

<h1>📚 Study Tracker Pro+</h1>

<!-- ストリーク -->
<div class="card">
<h2>🔥 ストリーク</h2>
<p id="streak">0日</p>
</div>

<!-- アドバイス -->
<div class="card">
<h2>💡 アドバイス</h2>
<p id="advice">読み込み中...</p>
</div>

<!-- テスト日 -->
<div class="card">
<h2>📅 テスト日</h2>
<input type="date" id="testDate">
<button onclick="setTest()">設定</button>
</div>

<!-- 予定 -->
<div class="card">
<h2>📅 予定追加</h2>

<input type="date" id="eventDate">

<select id="eventType">
<option value="study">勉強</option>
<option value="club">部活</option>
<option value="cram">塾</option>
<option value="task">課題</option>
</select>

<input type="text" id="eventText" placeholder="内容">

<button onclick="addEvent()">追加</button>
</div>

<!-- カレンダー -->
<div class="card">
<h2>📅 カレンダー</h2>
<div id="calendar">読み込み中...</div>
</div>

<script>

let testDate=null;
let events={};

/* ================= 安全保存 ================= */
function saveData(){
  try{
    localStorage.setItem("testDate", document.getElementById("testDate")?.value || "");
    localStorage.setItem("events", JSON.stringify(events));
  }catch(e){}
}

/* ================= 読み込み ================= */
function loadData(){
  try{
    const t=localStorage.getItem("testDate");
    if(t){
      document.getElementById("testDate").value=t;
      testDate=new Date(t+"T00:00:00");
    }

    const e=localStorage.getItem("events");
    if(e) events=JSON.parse(e);

  }catch(e){}

  updateAll();
}

/* ================= テスト日 ================= */
function setTest(){
  try{
    const v=document.getElementById("testDate").value;
    if(!v) return;
    testDate=new Date(v+"T00:00:00");
    saveData();
    updateAll();
  }catch(e){}
}

/* ================= 予定 ================= */
function addEvent(){
  try{
    const date=document.getElementById("eventDate").value;
    const text=document.getElementById("eventText").value;

    if(!date||!text) return;

    if(!events[date]) events[date]=[];
    events[date].push({text});

    document.getElementById("eventText").value="";

    saveData();
    updateAll();
  }catch(e){}
}

/* ================= 日付 ================= */
function formatDate(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/* ================= ストリーク（簡易） ================= */
function updateStreak(){
  const el=document.getElementById("streak");
  if(!el) return;

  let count=0;
  if(events){
    count=Object.keys(events).length;
  }
  el.innerText=`${count}日`;
}

/* ================= アドバイス ================= */
function updateAdvice(){
  const el=document.getElementById("advice");
  if(!el) return;

  const tips=[
    "今日は30分だけでもやる",
    "小さい目標を1つだけ決める",
    "やる気は後から出る",
    "5分だけ始めるのがコツ"
  ];

  el.innerText=tips[Math.floor(Math.random()*tips.length)];
}

/* ================= カレンダー ================= */
function generateCalendar(){

  const c=document.getElementById("calendar");
  if(!c) return;

  c.innerHTML="";

  if(!testDate){
    c.innerHTML="📅 テスト日を設定してください";
    return;
  }

  for(let i=30;i>=0;i--){

    try{
      let d=new Date(testDate);
      d.setDate(d.getDate()-i);

      const key=formatDate(d);
      const label=`${d.getMonth()+1}/${d.getDate()}`;

      let div=document.createElement("div");
      div.className="calendar-day";

      let text="";

      if(events?.[key]){
        text="<br>"+events[key].map(e=>"・"+e.text).join("<br>");
      }

      if(i===0){
        div.innerHTML=`<span class="test">${label} テスト</span>${text}`;
      }else if(i===14){
        div.innerHTML=`<span class="due">${label} ⚠ 締切</span>${text}`;
      }else if(i<14){
        div.innerHTML=`<span class="focus">${label} 📚 集中期間</span>${text}`;
      }else{
        div.innerHTML=`${label}${text}`;
      }

      c.appendChild(div);

    }catch(e){}
  }
}

/* ================= 全更新 ================= */
function updateAll(){
  try{
    generateCalendar();
    updateStreak();
    updateAdvice();
  }catch(e){}
}

/* ================= 起動 ================= */
loadData();

</script>

</body>
</html>
